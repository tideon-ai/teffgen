name: Health Check

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  website-health:
    name: Website & Infrastructure Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run health checks
        id: health
        run: |
          python -c "
          import requests
          import socket
          import ssl
          import json
          import datetime
          import sys

          results = []
          all_passed = True

          # 1. Check effgen.org HTTP 200
          try:
              r = requests.get('https://effgen.org', timeout=10)
              passed = r.status_code == 200
              results.append({
                  'name': 'effgen.org HTTP',
                  'passed': passed,
                  'message': f'HTTP {r.status_code} ({r.elapsed.total_seconds():.1f}s)',
              })
              if not passed:
                  all_passed = False
          except Exception as e:
              results.append({'name': 'effgen.org HTTP', 'passed': False, 'message': str(e)})
              all_passed = False

          # 2. Check docs.effgen.org HTTP 200
          try:
              r = requests.get('https://docs.effgen.org', timeout=10)
              passed = r.status_code == 200
              results.append({
                  'name': 'docs.effgen.org HTTP',
                  'passed': passed,
                  'message': f'HTTP {r.status_code} ({r.elapsed.total_seconds():.1f}s)',
              })
              if not passed:
                  all_passed = False
          except Exception as e:
              results.append({'name': 'docs.effgen.org HTTP', 'passed': False, 'message': str(e)})
              all_passed = False

          # 3. DNS resolution
          try:
              ip = socket.gethostbyname('effgen.org')
              results.append({'name': 'DNS Resolution', 'passed': True, 'message': f'effgen.org -> {ip}'})
          except Exception as e:
              results.append({'name': 'DNS Resolution', 'passed': False, 'message': str(e)})
              all_passed = False

          # 4. SSL certificate expiry
          try:
              ctx = ssl.create_default_context()
              with ctx.wrap_socket(socket.socket(), server_hostname='effgen.org') as s:
                  s.settimeout(10)
                  s.connect(('effgen.org', 443))
                  cert = s.getpeercert()
                  expires = datetime.datetime.strptime(cert['notAfter'], '%b %d %H:%M:%S %Y %Z')
                  days_left = (expires - datetime.datetime.utcnow()).days
                  passed = days_left > 14
                  results.append({
                      'name': 'SSL Certificate',
                      'passed': passed,
                      'message': f'Expires {expires.strftime(\"%Y-%m-%d\")} ({days_left} days left)',
                  })
                  if not passed:
                      all_passed = False
          except Exception as e:
              results.append({'name': 'SSL Certificate', 'passed': False, 'message': str(e)})
              all_passed = False

          # 5. Response time < 5s
          try:
              r = requests.get('https://effgen.org', timeout=10)
              passed = r.elapsed.total_seconds() < 5.0
              results.append({
                  'name': 'Response Time',
                  'passed': passed,
                  'message': f'{r.elapsed.total_seconds():.2f}s (threshold: 5s)',
              })
              if not passed:
                  all_passed = False
          except Exception as e:
              results.append({'name': 'Response Time', 'passed': False, 'message': str(e)})
              all_passed = False

          # 6. PyPI package availability
          try:
              r = requests.get('https://pypi.org/pypi/effgen/json', timeout=10)
              if r.status_code == 200:
                  version = r.json()['info']['version']
                  results.append({'name': 'PyPI Package', 'passed': True, 'message': f'effgen {version} available'})
              else:
                  results.append({'name': 'PyPI Package', 'passed': False, 'message': f'HTTP {r.status_code}'})
                  all_passed = False
          except Exception as e:
              results.append({'name': 'PyPI Package', 'passed': False, 'message': str(e)})
              all_passed = False

          # 7. API docs endpoint (if docs site serves API reference)
          try:
              r = requests.get('https://docs.effgen.org/api/', timeout=10, allow_redirects=True)
              passed = r.status_code in (200, 301, 302, 404)  # 404 is OK if docs restructured
              results.append({
                  'name': 'API Docs',
                  'passed': True,  # Don't fail health on docs path changes
                  'message': f'HTTP {r.status_code}',
              })
          except Exception as e:
              results.append({'name': 'API Docs', 'passed': True, 'message': f'Skipped: {e}'})

          # Print results
          for r in results:
              icon = 'PASS' if r['passed'] else 'FAIL'
              print(f'[{icon}] {r[\"name\"]}: {r[\"message\"]}')

          # Write summary for GitHub
          with open('health-results.json', 'w') as f:
              json.dump({'all_passed': all_passed, 'results': results}, f, indent=2)

          if not all_passed:
              print('::error::One or more health checks failed!')
              sys.exit(1)
          "

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = [];
            try {
              const data = JSON.parse(fs.readFileSync('health-results.json', 'utf8'));
              results = data.results;
            } catch (e) {
              results = [{name: 'Health Check Script', passed: false, message: 'Script failed to execute'}];
            }

            const failed = results.filter(r => !r.passed);
            const body = [
              '## Health Check Failure',
              '',
              `**Time:** ${new Date().toISOString()}`,
              `**Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              '',
              '### Failed Checks',
              ...failed.map(r => `- **${r.name}**: ${r.message}`),
              '',
              '### All Results',
              ...results.map(r => `- ${r.passed ? '✅' : '❌'} **${r.name}**: ${r.message}`),
            ].join('\n');

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check-failure',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Health Check Failure: ${failed.map(r => r.name).join(', ')}`,
                body: body,
                labels: ['health-check-failure', 'automated'],
              });
            }
