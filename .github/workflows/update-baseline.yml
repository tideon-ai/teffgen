name: Update Eval Baseline

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Eval suite to update baseline for"
        required: true
        default: "math"
        type: choice
        options:
          - math
          - tool_use
          - reasoning
          - safety
          - conversation
      version:
        description: "Version label for this baseline"
        required: true
        default: "0.2.1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baseline:
    name: Update Baseline (${{ inputs.suite }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval suite and save baseline
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from effgen.eval import AgentEvaluator, RegressionTracker, get_suite
          from effgen.eval.evaluator import ScoringMode

          class Resp:
              def __init__(self, o): self.output = o; self.tokens_used = 0; self.execution_trace = []
          class DummyAgent:
              def run(self, q):
                  import re
                  m = re.findall(r"\d+", q)
                  return Resp(m[-1] if m else "")

          suite_name = "${{ inputs.suite }}"
          version = "${{ inputs.version }}"

          ev = AgentEvaluator(DummyAgent(), scoring=ScoringMode.CONTAINS)
          suite = get_suite(suite_name)
          results = ev.run_suite(suite)
          print(results.summary())

          tracker = RegressionTracker()
          tracker.save_baseline(suite_name, results, version=version)
          print(f"Baseline saved for {suite_name} v{version}")
          PY

      - name: Commit baseline update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/benchmarks/
          git diff --cached --quiet || git commit -m "chore: update ${{ inputs.suite }} eval baseline for v${{ inputs.version }}"
          git push
