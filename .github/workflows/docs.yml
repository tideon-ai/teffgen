# NOTE: Disabled for now. Uncomment the 'on' trigger when ready to auto-deploy docs.
name: Docs

# on:
#   push:
#     branches: [main]
#     paths:
#       - "docs/**"
#       - "README.md"
#       - "CHANGELOG.md"
#       - "mkdocs.yml"

on:
  workflow_dispatch:  # Manual trigger only for now

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python] mkdocs-gen-files

      - name: Build docs
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict
          else
            echo "No mkdocs.yml found, skipping build"
            mkdir -p site
            cp README.md site/index.md
          fi

      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./site"
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DOCS_SITE_ID }}
