name: Monitor

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC daily (offset from nightly to avoid congestion)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write

jobs:
  # ------------------------------------------------------------------ #
  # 1. Import health — all public symbols must import cleanly           #
  # ------------------------------------------------------------------ #
  import-health:
    name: Import Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install
        run: pip install -e ".[dev]" -q
      - name: Smoke-import all public symbols
        id: import_check
        run: |
          python - <<'PY'
          import teffgen, sys
          failed = []
          for name in teffgen.__all__:
              try:
                  obj = getattr(teffgen, name)
                  assert obj is not None
              except Exception as e:
                  failed.append(f"{name}: {e}")
          if failed:
              print("IMPORT FAILURES:")
              for f in failed: print(f" - {f}")
              sys.exit(1)
          print(f"OK: {len(teffgen.__all__)} public symbols imported cleanly")
          PY

  # ------------------------------------------------------------------ #
  # 2. Full unit test suite with coverage gate                          #
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install
        run: pip install -e ".[dev]" -q
      - name: Run unit tests
        id: unit
        run: |
          pytest tests/unit/ tests/benchmarks/ \
            --cov=teffgen --cov-report=json:coverage.json \
            -m "not gpu and not api and not docker" \
            --tb=short -q
      - name: Coverage gate (≥60%)
        run: |
          python - <<'PY'
          import json, sys
          data = json.load(open("coverage.json"))
          pct = data["totals"]["percent_covered"]
          print(f"Coverage: {pct:.1f}%")
          if pct < 60:
              print(f"FAIL: coverage {pct:.1f}% < 60% threshold")
              sys.exit(1)
          PY
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-monitor
          path: coverage.json

  # ------------------------------------------------------------------ #
  # 3. Eval regression (math suite — deterministic heuristic agent)     #
  # ------------------------------------------------------------------ #
  eval-regression:
    name: Eval Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install
        run: pip install -e ".[dev]" -q
      - name: Run math eval with real Cerebras llama3.1-8b
        id: eval
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          python - <<'PY'
          import os, sys
          from pathlib import Path
          from teffgen.eval import AgentEvaluator, MathSuite, RegressionTracker
          from teffgen.eval.evaluator import ScoringMode

          api_key = os.getenv("CEREBRAS_API_KEY", "")
          if not api_key:
              print("SKIPPED: CEREBRAS_API_KEY secret not set.")
              sys.exit(0)

          from teffgen.models.cerebras_adapter import CerebrasAdapter
          from teffgen.core.agent import Agent, AgentConfig
          from teffgen.tools.builtin.calculator import Calculator

          adapter = CerebrasAdapter("llama3.1-8b", enable_rate_limiting=False)
          adapter.load()
          config = AgentConfig(
              name="monitor-eval",
              model=adapter,
              tools=[Calculator()],
              system_prompt="You are a math assistant. Use the calculator tool for each computation. Give a concise final numerical answer.",
              max_iterations=5,
              temperature=0.1,
          )
          agent = Agent(config)

          ev = AgentEvaluator(agent, scoring=ScoringMode.CONTAINS)
          results = ev.run_suite(MathSuite(), max_cases=20)
          tracker = RegressionTracker()
          report = tracker.compare("math-20", results, version="ci-monitor")
          md = report.to_markdown()
          print(md)
          Path("regression-report.md").write_text(md)
          if report.has_regressions:
              raise SystemExit("Regression detected — see report above")
          PY
      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression-report.md
      - name: Open issue on regression
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.existsSync("regression-report.md")
              ? fs.readFileSync("regression-report.md", "utf8")
              : "Regression detected but no report file produced.";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Eval regression detected (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ["regression", "automated"],
            });

  # ------------------------------------------------------------------ #
  # 4. Dependency security audit — open issue on new CVEs               #
  # ------------------------------------------------------------------ #
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install audit tools
        run: pip install pip-audit safety -q
      - name: Run pip-audit
        id: audit
        run: |
          pip install -r requirements.txt -q
          pip-audit --format markdown -o audit-report.md || echo "CVEs found — see report"
          cat audit-report.md || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-report.md
      - name: Open issue on new CVEs
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.existsSync("audit-report.md")
              ? fs.readFileSync("audit-report.md", "utf8")
              : "pip-audit found vulnerabilities — see workflow logs.";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security CVEs detected (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ["security", "automated"],
            });

  # ------------------------------------------------------------------ #
  # 5. Ruff lint gate — zero errors                                     #
  # ------------------------------------------------------------------ #
  lint-gate:
    name: Lint Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install ruff
        run: pip install ruff -q
      - name: Ruff check
        id: lint
        run: ruff check teffgen/
      - name: Open issue on lint failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Lint failure detected (${new Date().toISOString().slice(0,10)})`,
              body: "Ruff lint check failed on main. See workflow run for details.",
              labels: ["lint", "automated"],
            });

  # ------------------------------------------------------------------ #
  # 6. Integration smoke — verify no runtime import errors              #
  # ------------------------------------------------------------------ #
  integration-smoke:
    name: Integration Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install
        run: pip install -e ".[dev]" -q
      - name: Run non-API integration tests
        run: |
          pytest tests/integration/ \
            -m "not gpu and not api and not docker" \
            --tb=short -q
      - name: Open issue on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Integration smoke failure (${new Date().toISOString().slice(0,10)})`,
              body: "Non-API integration tests failed on nightly monitor run. See workflow for details.",
              labels: ["bug", "automated"],
            });
