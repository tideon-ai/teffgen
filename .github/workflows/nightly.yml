name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

# Opt into Node.js 24 for all actions (Node 20 is deprecated Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  full-test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify critical imports
        run: |
          python -c "
          import effgen; print(f'effgen {effgen.__version__}')
          from effgen.guardrails import GuardrailChain
          from effgen.rag import DocumentIngester
          from effgen.eval import AgentEvaluator
          from effgen.domains import TechDomain
          from effgen.cache import PromptCache
          print('All imports OK')
          "

      - name: Run all unit tests
        run: |
          pytest tests/unit/ -v --cov=effgen --cov-report=xml \
            --tb=short --no-header

      - name: Run integration tests (non-GPU)
        run: |
          pytest tests/integration/ -v -m "not gpu and not docker" \
            --tb=short --no-header || true

      - name: Run e2e tests (non-GPU)
        run: |
          pytest tests/e2e/ -v -m "not gpu" \
            --tb=short --no-header || true

      - name: Run performance benchmarks
        run: |
          pytest tests/benchmarks/ -v --tb=short --no-header || true

  eval-regression:
    name: Eval Regression Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval suite against stored baseline (math)
        id: eval
        run: |
          # Uses a mock agent via the in-process evaluator; the CLI run
          # would require a real model. Nightly compares current results
          # against tests/benchmarks/eval_baseline_math.json and surfaces
          # any >5% accuracy drop or >20% latency increase.
          python - <<'PY'
          from pathlib import Path
          from effgen.eval import AgentEvaluator, MathSuite, RegressionTracker
          from effgen.eval.evaluator import ScoringMode

          class Resp:
              def __init__(self, o): self.output = o; self.tokens_used = 0; self.execution_trace = []
          class DummyAgent:
              def run(self, q):
                  import re
                  m = re.findall(r"\d+", q)
                  return Resp(m[-1] if m else "")

          ev = AgentEvaluator(DummyAgent(), scoring=ScoringMode.CONTAINS)
          results = ev.run_suite(MathSuite())
          tracker = RegressionTracker()
          report = tracker.compare("math", results, version="ci-nightly")
          print(report.to_markdown())
          Path("regression-report.md").write_text(report.to_markdown())
          if report.has_regressions:
              raise SystemExit("Regression detected — see report above")
          PY

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression-report.md

      - name: Open issue on regression
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('regression-report.md')
              ? fs.readFileSync('regression-report.md', 'utf8')
              : 'Regression detected but no report file produced.';
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Nightly eval regression detected (${new Date().toISOString().slice(0,10)})`,
                body,
                labels: ['regression', 'automated'],
              });
            } catch (e) {
              core.warning(`Could not open issue (likely permissions): ${e.message}`);
            }

