name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  full-test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run all unit tests
        run: |
          pytest tests/unit/ -v --cov=effgen --cov-report=xml \
            --tb=short --no-header

      - name: Run integration tests (non-GPU)
        run: |
          pytest tests/integration/ -v -m "not gpu and not docker" \
            --tb=short --no-header || true

      - name: Run e2e tests (non-GPU)
        run: |
          pytest tests/e2e/ -v -m "not gpu" \
            --tb=short --no-header || true

      - name: Run performance benchmarks
        run: |
          pytest tests/benchmarks/ -v --tb=short --no-header || true

  gpu-tests:
    name: GPU Tests
    runs-on: [self-hosted, gpu]
    if: github.repository == 'ctrl-gaurav/effGen'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run GPU integration tests
        run: |
          pytest tests/integration/ -v -m "gpu" --tb=short || true

      - name: Run GPU e2e tests
        run: |
          pytest tests/e2e/ -v -m "gpu" --tb=short || true

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Check for security advisories
        run: |
          pip install -r requirements.txt
          pip-audit --format json --output audit-report.json || true
          safety check --output json > safety-report.json || true

      - name: Check for outdated dependencies
        run: pip list --outdated --format json > outdated.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            audit-report.json
            safety-report.json
            outdated.json
