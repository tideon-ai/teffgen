{% set name = "effgen" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - effgen = effgen.cli:main
    - effgen-agent = effgen.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - torch >=2.0.0
    - transformers >=4.30.0
    - accelerate >=0.20.0
    - pyyaml >=6.0
    - aiohttp >=3.8.0
    - rich >=13.0.0
    - pydantic >=2.0.0

test:
  imports:
    - effgen
    - effgen.core.agent
    - effgen.tools
    - effgen.presets

about:
  home: https://effgen.org
  license: Apache-2.0
  license_file: LICENSE
  summary: Agentic AI framework optimized for Small Language Models
  dev_url: https://github.com/ctrl-gaurav/effGen
