# tideon.ai Production Deployment Stack
# ====================================
# API server + Prometheus monitoring + Grafana dashboards
#
# Usage:
#   docker-compose up -d
#   # API:        http://localhost:8000
#   # Prometheus: http://localhost:9090
#   # Grafana:    http://localhost:3000 (admin/admin)

version: "3.9"

services:
  # ── tideon.ai API Server ──────────────────────────────────────
  teffgen-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: teffgen-api:latest
    container_name: teffgen-api
    ports:
      - "8000:8000"
    environment:
      - TEFFGEN_HOST=0.0.0.0
      - TEFFGEN_PORT=8000
      - TEFFGEN_API_KEY=${TEFFGEN_API_KEY:-changeme}
      - TEFFGEN_RATE_LIMIT=${TEFFGEN_RATE_LIMIT:-60}
      # Model config — adjust to your hardware
      - TEFFGEN_MODEL=${TEFFGEN_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - teffgen-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: teffgen-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: teffgen-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  teffgen-data:
  prometheus-data:
  grafana-data:
